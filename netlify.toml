[build]
  publish = "."

# Force HTTPS
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# SPA fallback — send all routes to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
